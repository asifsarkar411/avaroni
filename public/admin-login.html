<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVARONI ADMIN</title>
    <link rel="icon" href="./fabicon.png" type="image/png">
    <link rel="stylesheet" href="secure-auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container">
        <form id="loginForm">
            <h2>Secure Login</h2>
            
            <div class="input-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="e.g. asif@email.com" required>
            </div>

            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
            </div>

            <div class="input-group" id="otp-group" style="display: none; margin-top: 15px;">
                <label for="otp-code">6-Digit Verification Code</label>
                <input type="text" id="otp-code" placeholder="Check your email for code">
            </div>

            <button type="submit" class="btn" style="margin-top: 15px;">Login</button>
            
            <!--<div class="footer-links" style="margin-top: 20px;">
                <a href="forgot-password.html" class="nav-btn">Forgot Password?</a>
                <a href="register.html" class="nav-btn">Don't have an account? Register here</a>
            </div>-->
        </form>
    </div>
   <script src="secure-auth.js"></script>
</body>
</html>
