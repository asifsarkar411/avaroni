<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="secure-auth.css"> 
    <link rel="icon" href="./fabicon.png" type="image/png">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container">
        <form id="forgotForm">
            <h2>Reset Password</h2>
            <p style="color: rgba(255, 255, 255, 0.7); font-size: 14px; margin-bottom: 15px;">
                Enter your email address to receive a reset link.
            </p>
            
            <div class="input-group">
                <label for="forgot-email">Email</label>
                <input type="email" id="forgot-email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn" style="margin-top: 15px;">Send Reset Link</button>
            
            <div style="margin-top: 10px;">
                <a href="admin-login.html" class="nav-btn">Back to Login</a>
            </div>
        </form>
    </div>
<script src="secure-auth.js"></script>
</body>
</html>
