<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - আভরণী</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="./img/profile_image.jpg" alt="Logo" class="nav-logo">
            <B>আভরণী</B>
        </a>
        <div class="nav-links">
            <a href="women.html">Women Dress</a>
            <a href="ornament.html">Ornament</a>
            <a href="kids.html">Kids Zone</a>
            <a href="cart.html" class="cart-icon"><i class="fas fa-shopping-cart"></i></a>
            <i id="menu-icon-btn" class="fas fa-bars menu-icon" style="cursor: pointer; font-size: 24px; margin-left: 15px; color: #333;"></i>
        </div>
    </nav>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" id="close-sidebar-btn" class="close-btn">&times;</a>
        <a href="women.html"><i class="fas fa-female"></i> Women Dress</a>
        <a href="ornament.html"><i class="fas fa-gem"></i> Ornament</a>
        <a href="kids.html"><i class="fas fa-child"></i> Kids Zone</a>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 10px 0;">
        <a href="return-product.html"><i class="fas fa-undo"></i> Return Product</a>
        <a href="return-policy.html"><i class="fas fa-file-contract"></i> Return Policy</a>
        <a href="about.html"><i class="fas fa-info-circle"></i> About Us</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    </div>

    <h2 class="page-title"><i class="fas fa-shopping-bag"></i> Shopping Cart</h2>
    
    <div class="cart-container" style="max-width: 900px; margin: 20px auto; padding: 20px;">
        <div id="cart-items"></div> 
        
        <div class="cart-price-summary">
            <div class="cart-price-row">
                <span>Subtotal</span>
                <span>৳<span id="cart-subtotal">0</span></span>
            </div>
            <div class="cart-price-row" style="font-size: 13px; color: #aaa;">
                <span>Shipping</span>
                <span>Calculated at checkout</span>
            </div>
            <div class="cart-price-row total-row">
                <span>Estimated Total</span>
                <span>৳<span id="cart-total">0</span></span>
            </div>
        </div>

        <div class="cart-actions">
            <a href="index.html" class="btn" style="background: #555; text-decoration: none;"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
            <a href="payment.html" class="btn" id="proceed-to-payment-btn" style="background: #e60050; text-decoration: none;"><i class="fas fa-credit-card"></i> Proceed to Checkout</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
