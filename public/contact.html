<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - আভরণী</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; color: #333; }
        .header { background-color: #ba217b; padding: 20px; color: white; text-align: center; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 30px; }
        .contact-info, .contact-form { flex: 1; min-width: 300px; }
        h2 { color: #ba217b; margin-top: 0; }
        .back-link { display: block; margin-bottom: 20px; color: #ba217b; text-decoration: none; font-weight: bold; width: 100%; }
        .back-link:hover { text-decoration: underline; }
        .info-item { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .info-item i { font-size: 20px; color: #ba217b; width: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #ba217b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #961861; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Glamour Store</h1>
    </div>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
        
        <div class="contact-info">
            <h2><i class="fas fa-envelope"></i> Get in Touch</h2>
            <p>Have questions about your order, our products, or our store? Send us a message or reach out directly.</p>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>123 Fashion Avenue, Dhaka, Bangladesh</span>
            </div>
            <div class="info-item">
                <i class="fas fa-phone-alt"></i>
                <span>+880 1234-567890</span>
            </div>
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>support@glamourstore.com</span>
            </div>
        </div>

        <div class="contact-form">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="contact-email">Email Address</label>
                    <input type="email" id="contact-email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
